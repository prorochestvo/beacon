<!--
  Representative slice of www.gismeteo.kz/weather-almaty-5205/ captured 2026-06-30.
  Three tabs are preserved so the anchored temp regexes are genuinely exercised:
    tab 1 — "сейчас"  (not active, no day-chart structure)
    tab 2 — "сегодня" (is-active, today's forecast: TempMax=26, TempMin=19)
    tab 3 — "завтра"  (not active, tomorrow: TempMax=25, TempMin=18)
  The anchored regexes must pick today's values, not tomorrow's.
  Dynamic tokens (nonces, CSRF) stripped; timestamps left (not matched by any regex).
  Precipitation widget: 0.3 + 0.05 + 0.05 + 0.1 = 0.50 mm.
-->

    <div class="weathertabs" data-nosnippet>


                <a class="weathertab"

                        <div class="date">
